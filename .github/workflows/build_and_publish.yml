name: Build & Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing GitHub release tag to build and publish"
        required: true
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.release_tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build tools
        run: python -m pip install --upgrade build

      - name: Build distributions
        run: python -m build --sdist --wheel

      - name: Attach distributions to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: gh release upload "$RELEASE_TAG" dist/* --clobber

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
